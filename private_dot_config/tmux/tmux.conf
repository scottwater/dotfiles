set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -q -g status-utf8 on
setw -q -g utf8 on

unbind r
bind r source-file ~/.config/tmux/tmux.conf

bind-key '\' send-keys C-l

set -g mouse on
set-option -g status-position top

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -s extended-keys on
set -as terminal-features 'xterm-ghostty:extkeys'
set -as terminal-features 'xterm-ghostty:RGB'
set -as terminal-features 'xterm-ghostty:usstyle'

# LDUR
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Keep the current path
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Override colors to match Dracula Pro Alucard
set -g @dracula-colors "
dark_gray #F5F5F5
gray #FFFFFF
light_purple #644AC9
dark_purple #635D97
cyan #036A96
green #14710A
orange #A34D14
pink #A3144D
purple #644AC9
red #CB3A2A
yellow #846E15
white #1F1F1F
"

# Plugins to show
set -g @dracula-plugins "git cwd"

# Powerline look
set -g @dracula-show-powerline true
set -g @dracula-powerline-symbols on

# Left icon
set -g @dracula-show-left-icon session

# Window settings
set -g @dracula-show-flags true

# Clean look
set -g @dracula-border-contrast true

set -g @plugin 'christoomey/vim-tmux-navigator'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"
bind-key -N "Toggle Yazi floating popup" F if-shell -F '#{==:#{session_name},yazi_float}' { detach-client } { popup -E -w80% -h80% 'tmux attach -t yazi_float || tmux new -s yazi_float "yazi"' }

